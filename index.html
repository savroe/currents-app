<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Currents">
<title>Currents</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--td:#3F6D6D;--tm:#71A6A7;--ts:#A8CDCE;--co:#D48A7E;--sg:#94A79B;--pb:#F4F1ED;--sd:#E1DDD7;--kp:#2F3831;--wh:#fff;--sip:#D48A7E;--sfin:#71A6A7;--spau:#C4A882;--sdrp:#94A79B;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--wh);color:var(--kp);min-height:100vh;max-width:430px;margin:0 auto;}
.hdr{background:var(--wh);padding:52px 22px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--sd);}
.hrow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.htitle{font-family:'DM Serif Display',serif;font-size:36px;color:var(--td);letter-spacing:-1px;line-height:1.1;}
.hdate{font-size:16px;font-weight:500;color:var(--tm);margin-top:4px;}
.bplus{width:38px;height:38px;border-radius:10px;border:2px solid var(--co);background:none;color:var(--co);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:4px;transition:all .15s;}
.bplus:active{background:var(--co);color:var(--wh);}
.pg{padding:20px 22px 100px;animation:fu .22s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.lbl{font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--sg);margin-bottom:10px;margin-top:26px;}
.lbl:first-child{margin-top:0;}
.si{display:flex;align-items:baseline;padding:10px 0 10px 14px;border-left:3px solid transparent;gap:0;}
.si.on{border-left-color:var(--co);}
.st{font-size:16px;font-weight:500;min-width:90px;flex-shrink:0;color:var(--tm);}
.si.off .st{color:var(--sg);}.si.on .st{color:var(--co);}.si.on .st{color:var(--co);}
.se{font-size:18px;color:var(--kp);}
.si.off .se{opacity:.55;}
.sdx{margin-left:auto;background:none;border:none;color:var(--sg);font-size:18px;cursor:pointer;padding:0 4px;opacity:.35;}
.sdx:active{opacity:1;color:var(--co);}
.semp{font-size:12px;color:var(--sg);opacity:.7;padding:8px 0 8px 14px;}
.sform{background:var(--pb);border:1px solid var(--sd);border-radius:13px;padding:14px;margin-bottom:6px;animation:fu .18s ease both;}
.frow{display:flex;gap:8px;margin-bottom:9px;}
.fi{border:1.5px solid var(--sd);border-radius:9px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--kp);background:var(--wh);outline:none;transition:border-color .15s;width:100%;}
.fi:focus{border-color:var(--tm);}
.fi::placeholder{color:var(--sg);opacity:.75;}
.fitw{flex:0 0 90px;width:90px;}
.few{flex:1;}
.brow{display:flex;gap:8px;}
.bs{background:var(--td);color:var(--wh);border:none;border-radius:9px;padding:9px 18px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;}
.bcc{background:var(--sd);color:var(--kp);border:none;border-radius:9px;padding:9px 14px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;}
.ti{display:flex;align-items:center;gap:10px;padding:8px 0;}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--kp);flex-shrink:0;opacity:.6;}
.tt{font-size:14px;color:var(--kp);flex:1;cursor:pointer;user-select:none;}
.tt.dn{text-decoration:line-through;opacity:.35;}
.tx{background:none;border:none;color:var(--sg);font-size:16px;cursor:pointer;padding:0 3px;opacity:.35;flex-shrink:0;}
.tx:active{opacity:1;color:var(--co);}
.tarow{display:flex;gap:8px;margin-top:8px;}
.tinp{flex:1;border:1.5px solid var(--sd);border-radius:9px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--kp);background:var(--pb);outline:none;}
.tinp:focus{border-color:var(--tm);}
.tinp::placeholder{color:var(--sg);opacity:.7;}
.btadd{background:var(--td);color:var(--wh);border:none;border-radius:9px;padding:9px 16px;font-size:20px;line-height:1;cursor:pointer;flex-shrink:0;}
.calw{background:var(--wh);border:1px solid var(--sd);border-radius:16px;padding:16px 14px;margin-top:4px;}
.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cnb{width:28px;height:28px;border-radius:7px;border:1px solid var(--sd);background:var(--wh);color:var(--td);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;}
.cnb:active{background:var(--pb);}
.cmt{font-family:'DM Serif Display',serif;font-size:28px;color:var(--tm);letter-spacing:-.5px;}
.cgr{display:grid;grid-template-columns:repeat(7,1fr);}
.cdw{font-size:10px;font-weight:600;text-align:center;color:var(--sg);padding-bottom:8px;letter-spacing:.3px;}
.cc{display:flex;flex-direction:column;align-items:center;padding:2px 0;min-height:36px;position:relative;cursor:pointer;}
.cn{font-size:12px;color:var(--kp);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:400;transition:background .12s;}
.cn.td{background:var(--co);color:var(--wh);font-weight:600;}
.cn.ot{opacity:.22;}.cn.sel{background:var(--td);color:var(--wh);font-weight:600;}.cdot{width:4px;height:4px;border-radius:50%;background:var(--co);margin-top:2px;}.cc:active .cn:not(.td):not(.sel){background:var(--pb);}.dpanel{border:1px solid var(--sd);border-radius:13px;padding:14px;margin-top:12px;animation:fu .18s ease both;}
.subnav{display:flex;gap:7px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px;}
.subnav::-webkit-scrollbar{display:none;}
.spl{flex-shrink:0;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:1.5px solid var(--sd);background:var(--wh);color:var(--sg);transition:all .15s;}
.spl.on{background:var(--td);color:var(--wh);border-color:var(--td);}
.sechead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sechl{display:flex;align-items:center;gap:8px;}
.secico{font-size:20px;}
.sectit{font-family:'DM Serif Display',serif;font-size:22px;color:var(--kp);letter-spacing:-.3px;}
.seccnt{font-size:10px;font-weight:600;background:var(--sd);color:var(--sg);border-radius:20px;padding:3px 9px;}
.badd{background:var(--td);color:var(--wh);border:none;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:transform .1s;}
.badd:active{transform:scale(.96);}
.badd.cn2{background:var(--sd);color:var(--kp);}
.mf{background:var(--pb);border:1px solid var(--sd);border-radius:14px;padding:15px;margin-bottom:13px;animation:fu .18s ease both;}
.mi{width:100%;border:1.5px solid var(--sd);border-radius:9px;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--kp);background:var(--wh);outline:none;margin-bottom:8px;transition:border-color .15s;}
.mi:focus{border-color:var(--tm);}
.mi::placeholder{color:var(--sg);opacity:.75;}
textarea.mi{resize:none;line-height:1.6;}
.sr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.sp{border-radius:20px;padding:5px 12px;font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:1.5px solid var(--sd);background:var(--wh);color:var(--sg);transition:all .15s;letter-spacing:.4px;text-transform:uppercase;}
.sp.ip{border-color:var(--sip);background:var(--sip);color:#fff;}
.sp.fin{border-color:var(--sfin);background:var(--sfin);color:#fff;}
.sp.pau{border-color:var(--spau);background:var(--spau);color:#fff;}
.sp.drp{border-color:var(--sdrp);background:var(--sdrp);color:#fff;}
.bfu{width:100%;background:var(--td);color:var(--wh);border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;}
.ic{background:var(--wh);border:1px solid var(--sd);border-radius:13px;padding:13px 14px;margin-bottom:8px;animation:fu .18s ease both;}
.ict{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.ici{flex:1;min-width:0;}
.itr{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap;}
.inm{font-size:14px;font-weight:600;color:var(--kp);}
.sb{font-size:10px;font-weight:600;border-radius:20px;padding:3px 9px;letter-spacing:.4px;text-transform:uppercase;}
.bip{background:rgba(212,138,126,.12);color:var(--sip);}
.bfin{background:rgba(113,166,167,.12);color:var(--sfin);}
.bpau{background:rgba(196,168,130,.12);color:var(--spau);}
.bdrp{background:rgba(148,167,155,.12);color:var(--sdrp);}
.ino{font-size:12px;color:var(--kp);opacity:.65;margin-bottom:3px;line-height:1.45;}
.idt{font-size:10px;color:var(--sg);opacity:.65;}
.iact{display:flex;gap:5px;flex-shrink:0;}
.be,.bd{border-radius:7px;padding:5px 11px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:1.5px solid var(--sd);background:var(--wh);color:var(--kp);}
.bd{border-color:rgba(212,138,126,.35);color:var(--co);}
.emp{text-align:center;padding:30px 16px;border:1.5px dashed var(--sd);border-radius:13px;color:var(--sg);font-size:12px;line-height:1.6;}
.ei{font-size:28px;margin-bottom:8px;}
.mr{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.mb{font-size:21px;background:var(--pb);border:2px solid transparent;border-radius:9px;padding:5px 7px;cursor:pointer;}
.mb.sl{border-color:var(--tm);background:rgba(113,166,167,.1);}
.jc{background:var(--wh);border:1px solid var(--sd);border-radius:13px;padding:13px 14px;margin-bottom:8px;cursor:pointer;animation:fu .18s ease both;}
.jh{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.jl{display:flex;align-items:center;gap:9px;}
.jmo{font-size:21px;}
.jdt{font-size:14px;font-weight:600;color:var(--kp);}
.jtm{font-size:10px;color:var(--sg);opacity:.65;margin-top:1px;}
.jch{font-size:10px;color:var(--sg);transition:transform .18s;}
.jch.op{transform:rotate(180deg);}
.jpv{font-size:12px;color:var(--kp);opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jfl{font-size:14px;color:var(--kp);opacity:.82;line-height:1.7;white-space:pre-wrap;padding-top:10px;border-top:1px solid var(--sd);margin-top:8px;}
.cs{text-align:center;padding:70px 24px;color:var(--sg);}
.csic{font-size:42px;margin-bottom:14px;}
.cs h2{font-family:'DM Serif Display',serif;font-size:22px;color:var(--kp);margin-bottom:8px;}
.cs p{font-size:12px;line-height:1.6;opacity:.75;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--wh);border-top:1px solid var(--sd);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;background:none;border:none;padding:10px 2px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nb:active{opacity:.6;}
.ni{font-size:20px;line-height:1;}
.nl{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--sg);font-family:'DM Sans',sans-serif;opacity:.65;}
.nb.on .nl{color:var(--td);opacity:1;}
.nd{width:4px;height:4px;border-radius:50%;background:var(--td);opacity:0;transition:opacity .18s;}
.nb.on .nd{opacity:1;}
</style>
</head>
<body>
<div class="hdr" id="hdr">
  <div class="hrow">
    <div><div class="htitle" id="ht">Today</div><div class="hdate" id="hd"></div></div>
    <button class="bplus" id="bp" onclick="hp()">+</button>
  </div>
</div>
<div id="app"></div>
<nav class="bnav">
  <button class="nb on" onclick="go('calendar')" id="n-calendar"><span class="ni">📅</span><span class="nl">Calendar</span><span class="nd"></span></button>
  <button class="nb" onclick="go('shop')" id="n-shop"><span class="ni">🛍</span><span class="nl">Shop</span><span class="nd"></span></button>
  <button class="nb" onclick="go('currents')" id="n-currents"><span class="ni">🌊</span><span class="nl">Currents</span><span class="nd"></span></button>
  <button class="nb" onclick="go('recipes')" id="n-recipes"><span class="ni">🍳</span><span class="nl">Recipes</span><span class="nd"></span></button>
  <button class="nb" onclick="go('lists')" id="n-lists"><span class="ni">📋</span><span class="nl">Lists</span><span class="nd"></span></button>
</nav>
<script>
var T=new Date(),ct='calendar',cs='watching',cy=T.getFullYear(),cm=T.getMonth();
var ssf=false,sti='',sev='',eid=null,exj=null,showTF=false,selDay=null,showDF=false,dti='',dev2='';
var af={watching:0,reading:0,listening:0,journal:0};
var fd={t:'',n:'',s:'In Progress',tx:'',m:'😊'};
function ld(k){try{return JSON.parse(localStorage.getItem(k))||[];}catch{return[];}}
function sv(k,d){try{localStorage.setItem(k,JSON.stringify(d));}catch{}}
function e(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ord(d){var s=['th','st','nd','rd'],v=d%100;return d+(s[(v-20)%10]||s[v]||s[0]);}
function fmtT(){return T.toLocaleDateString('en-US',{weekday:'long',month:'long'})+' '+ord(T.getDate());}
function sh(tab){
  var ht=document.getElementById('ht'),hd=document.getElementById('hd'),bp=document.getElementById('bp');
  var ttl={calendar:'Today',shop:'Shop',currents:'Currents',recipes:'Recipes',lists:'Lists'};
  ht.textContent=ttl[tab]||tab;
  hd.textContent=tab==='calendar'?fmtT():'';
  bp.style.display=['calendar','shop','lists'].includes(tab)?'flex':'none';
}
function go(tab){
  ct=tab;eid=null;exj=null;af={watching:0,reading:0,listening:0,journal:0};fd={t:'',n:'',s:'In Progress',tx:'',m:'😊'};ssf=false;showTF=false;selDay=null;showDF=false;showTF=false;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('n-'+tab).classList.add('on');
  sh(tab);render();
}
function hp(){if(ct==='calendar'){ssf=true;render();setTimeout(()=>{var el=document.getElementById('sti');if(el)el.focus();},50);}}
function render(){
  var app=document.getElementById('app');
  app.innerHTML=ct==='calendar'?rCal():ct==='currents'?rCur():rCS(ct);
}
function ia(ts){
  var n=new Date(),nm=n.getHours()*60+n.getMinutes(),pts=ts.toLowerCase().split('-'),s=pm(pts[0].trim());
  if(s===null)return false;
  if(pts.length===1)return Math.abs(nm-s)<60;
  var en=pm(pts[1].trim());return en===null?nm>=s:nm>=s&&nm<en;
}
function pm(s){var m=s.match(/^(\d+)(?::(\d+))?\s*(am|pm)$/i);if(!m)return null;var h=parseInt(m[1]),mn=parseInt(m[2]||'0'),ap=m[3].toLowerCase();if(ap==='pm'&&h!==12)h+=12;if(ap==='am'&&h===12)h=0;return h*60+mn;}
function rCal(){
  var sc=ld('sc').sort((a,b)=>a.time.localeCompare(b.time)),td=ld('td');
  var sf='';
  if(ssf)sf='<div class="sform"><div class="frow"><input class="fi fitw" id="sti" placeholder="9am" value="'+e(sti)+'" oninput="sti=this.value"><input class="fi few" id="sev" placeholder="Event name" value="'+e(sev)+'" oninput="sev=this.value" onkeydown="if(event.key===\'Enter\')savSc()"></div><div class="brow"><button class="bs" onclick="savSc()">Add</button><button class="bcc" onclick="ssf=false;render()">Cancel</button></div></div>';
  var sl=sc.length===0&&!ssf?'<div class="semp">No events yet — tap + to add one.</div>':sc.map(i=>'<div class="si '+(ia(i.time)?'on':'off')+'"><span class="st">'+e(i.time)+'</span><span class="se">'+e(i.event)+'</span><button class="sdx" onclick="dSc('+i.id+')">×</button></div>').join('');
  var tl=td.map(t=>'<div class="ti"><div class="tdot"></div><span class="tt'+(t.done?' dn':'')+'" onclick="togTd('+t.id+')">'+e(t.text)+'</span><button class="tx" onclick="dTd('+t.id+')">×</button></div>').join('');
  if(showTF)tl+='<div class="tarow"><input class="tinp" id="tdi" placeholder="Add a task…" onkeydown="if(event.key===\'Enter\')savTd()" autofocus><button class="btadd" onclick="savTd()">+</button></div>';
  var todoHdr='<div style="display:flex;align-items:center;justify-content:space-between;margin-top:26px;margin-bottom:10px;"><span class="lbl" style="margin:0">Todo</span><button onclick="showTF=!showTF;render();if(showTF)setTimeout(function(){var el=document.getElementById(\'tdi\');if(el)el.focus();},50)" style="background:none;border:none;font-size:13px;font-weight:600;color:var(--co);cursor:pointer;padding:0;letter-spacing:.3px;">+ Add</button></div>';
  return '<div class="pg"><div class="lbl">Schedule</div>'+sf+sl+todoHdr+'<div>'+tl+'</div><div class="lbl">Calendar</div>'+rMCal()+'</div>';
}
function savSc(){var t=document.getElementById('sti'),ev=document.getElementById('sev');var tm=(t?t.value:sti).trim(),evt=(ev?ev.value:sev).trim();if(!evt)return;var it=ld('sc');it.push({id:Date.now(),time:tm,event:evt});sv('sc',it);ssf=false;sti='';sev='';render();}
function dSc(id){sv('sc',ld('sc').filter(i=>i.id!==id));render();}
function savTd(){var el=document.getElementById('tdi'),tx=el?el.value.trim():'';if(!tx)return;var td=ld('td');td.push({id:Date.now(),text:tx,done:false});sv('td',td);render();}
function togTd(id){var td=ld('td'),t=td.find(i=>i.id===id);if(t)t.done=!t.done;sv('td',td);render();}
function dTd(id){sv('td',ld('td').filter(i=>i.id!==id));render();}
function dkey(y,m,d){return y+"-"+(m+1)+"-"+d;}
function evsFor(k){return ld("evs").filter(function(i){return i.key===k;}).sort(function(a,b){return (a.time||"").localeCompare(b.time||"");});}
function tapDay(d){selDay=selDay===d?null:d;showDF=false;render();}
function savDev(){
  var t=document.getElementById("dti"),ev=document.getElementById("dev2");
  var tm=(t?t.value:dti).trim(),evt=(ev?ev.value:dev2).trim();
  if(!evt||selDay===null)return;
  var it=ld("evs");it.push({id:Date.now(),key:dkey(cy,cm,selDay),time:tm,event:evt});
  sv("evs",it);showDF=false;dti="";dev2="";render();
}
function dEv(id){sv("evs",ld("evs").filter(function(i){return i.id!==id;}));render();}
function rMCal(){
  var MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var DN=["S","M","T","W","T","F","S"];
  var f=new Date(cy,cm,1),dw=f.getDay(),dm=new Date(cy,cm+1,0).getDate(),dp=new Date(cy,cm,0).getDate();
  var cl="";
  for(var i=dw-1;i>=0;i--)cl+='<div class="cc"><div class="cn ot">'+(dp-i)+'</div></div>';
  for(var dd=1;dd<=dm;dd++){
    var isTd=(dd===T.getDate()&&cm===T.getMonth()&&cy===T.getFullYear());
    var isSel=selDay===dd;
    var evs=evsFor(dkey(cy,cm,dd));
    var cls="cn"+(isTd?" td":"")+(isSel&&!isTd?" sel":"");
    cl+='<div class="cc" onclick="tapDay('+dd+')">';
    cl+='<div class="'+cls+'">'+dd+'</div>';
    if(evs.length>0&&!isTd)cl+='<div class="cdot"></div>';
    cl+='</div>';
  }
  var rm=(dw+dm)%7===0?0:7-(dw+dm)%7;
  for(var d2=1;d2<=rm;d2++)cl+='<div class="cc"><div class="cn ot">'+d2+'</div></div>';
  var out='<div class="calw"><div class="cnav">';
  out+='<button class="cnb" onclick="cm--;if(cm<0){cm=11;cy--;}selDay=null;render()">&#8249;</button>';
  out+='<div class="cmt">'+MN[cm]+' '+cy+'</div>';
  out+='<button class="cnb" onclick="cm++;if(cm>11){cm=0;cy++;}selDay=null;render()">&#8250;</button>';
  out+='</div><div class="cgr">';
  out+=DN.map(function(x){return '<div class="cdw">'+x+'</div>';}).join("");
  out+=cl+'</div></div>';
  if(selDay!==null){
    var sk=dkey(cy,cm,selDay),sevs=evsFor(sk);
    var slbl=new Date(cy,cm,selDay).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
    var df="";
    if(showDF){
      df+='<div class="sform" style="margin-top:10px">';
      df+='<div class="frow"><input class="fi fitw" id="dti" placeholder="9am" oninput="dti=this.value">';
      df+='<input class="fi few" id="dev2" placeholder="Event name" oninput="dev2=this.value" onkeydown="if(event.key===&quot;Enter&quot;)savDev()"></div>';
      df+='<div class="brow"><button class="bs" onclick="savDev()">Add</button><button class="bcc" onclick="showDF=false;render()">Cancel</button></div></div>';
    }
    var el=sevs.length===0&&!showDF
      ?'<div class="semp" style="padding-left:0">No events yet.</div>'
      :sevs.map(function(ev){
          return '<div class="si off" style="padding-left:0;border-left:none"><span class="st">'+e(ev.time||"\u2014")+'</span><span class="se">'+e(ev.event)+'</span><button class="sdx" onclick="dEv('+ev.id+')">&#215;</button></div>';
        }).join("");
    out+='<div class="dpanel">';
    out+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
    out+='<div style="font-family:&quot;DM Serif Display&quot;,serif;font-size:17px;color:var(--kp)">'+slbl+'</div>';
    out+='<button onclick="showDF=!showDF;render();if(showDF)setTimeout(function(){var x=document.getElementById(&quot;dev2&quot;);if(x)x.focus();},50)" style="background:var(--td);color:#fff;border:none;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:600;cursor:pointer">'+(showDF?"Cancel":"+ Add")+'</button>';
    out+='</div>'+df+el+'</div>';
  }
  return out;
}

var MS={watching:{l:'Watching',ic:'▶',ph:'What are you watching?',sk:'cw'},reading:{l:'Reading',ic:'📖',ph:'What are you reading?',sk:'cr'},listening:{l:'Listening',ic:'♪',ph:'What are you listening to?',sk:'cl'}};
var ST=['In Progress','Finished','Paused','Dropped'],SC={'In Progress':'ip','Finished':'fin','Paused':'pau','Dropped':'drp'};
var MOODS=['😊','😌','😐','😔','😤','🥳','😴','🤔','💭','🌊'];
function rCur(){
  var pills=['watching','reading','listening','journal'].map(k=>{var lb=k==='journal'?'✍️ Journal':((MS[k]?MS[k].ic+' '+MS[k].l:''));return '<button class="spl'+(cs===k?' on':'')+'" onclick="setSub(\''+k+'\')">'+lb+'</button>';}).join('');
  return '<div class="pg"><div class="subnav">'+pills+'</div>'+(cs==='journal'?rJ():rM(cs))+'</div>';
}
function setSub(k){cs=k;eid=null;af={watching:0,reading:0,listening:0,journal:0};fd={t:'',n:'',s:'In Progress',tx:'',m:'😊'};render();}
function rM(k){
  var s=MS[k],it=ld(s.sk),sh=af[k];
  var fh='';
  if(sh&&!eid)fh='<div class="mf"><input class="mi" id="fit" placeholder="'+s.ph+'" value="'+e(fd.t)+'" oninput="fd.t=this.value" onkeydown="if(event.key===\'Enter\')savIt(\''+k+'\')"><input class="mi" id="fin" placeholder="Add a note (optional)" value="'+e(fd.n)+'" oninput="fd.n=this.value"><div class="sr">'+ST.map(st=>'<button class="sp'+(fd.s===st?' '+SC[st]:'')+'" onclick="fd.s=\''+st+'\';render()">'+st+'</button>').join('')+'</div><button class="bfu" onclick="savIt(\''+k+'\')">Save</button></div>';
  var ih='';
  if(it.length===0&&!sh)ih='<div class="emp"><div class="ei">'+s.ic+'</div>Nothing here yet.<br>Tap + Add to get started.</div>';
  else ih=it.map(item=>{
    if(eid===item.id)return '<div class="mf"><input class="mi" value="'+e(item.title)+'" id="et'+item.id+'"><input class="mi" value="'+e(item.note||'')+'" id="en'+item.id+'" placeholder="Note"><div class="sr">'+ST.map(st=>'<button class="sp'+(item.status===st?' '+SC[st]:'')+'" onclick="updS(\''+k+'\','+item.id+',\''+st+'\')">'+st+'</button>').join('')+'</div><div style="display:flex;gap:8px"><button class="bfu" style="flex:1" onclick="savEd(\''+k+'\','+item.id+')">Save</button><button class="bfu" style="background:var(--sd);color:var(--kp);flex:0 0 auto;width:auto;padding:11px 16px" onclick="eid=null;render()">Cancel</button></div></div>';
    var sc=SC[item.status]||'ip';
    return '<div class="ic"><div class="ict"><div class="ici"><div class="itr"><span class="inm">'+e(item.title)+'</span><span class="sb b'+sc+'">'+item.status+'</span></div>'+(item.note?'<div class="ino">'+e(item.note)+'</div>':'')+'<div class="idt">'+item.date+'</div></div><div class="iact"><button class="be" onclick="eid='+item.id+';render()">Edit</button><button class="bd" onclick="dIt(\''+k+'\','+item.id+')">✕</button></div></div></div>';
  }).join('');
  return '<div><div class="sechead"><div class="sechl"><span class="secico">'+s.ic+'</span><span class="sectit">'+s.l+'</span>'+(it.length?'<span class="seccnt">'+it.length+'</span>':'')+'</div><button class="badd'+(sh?' cn2':'')+'" onclick="togA(\''+k+'\')">'+(sh?'Cancel':'+ Add')+'</button></div>'+fh+ih+'</div>';
}
function rJ(){
  var en=ld('cj'),sh=af.journal;
  var fh='';
  if(sh)fh='<div class="mf"><div class="mr">'+MOODS.map(m=>'<button class="mb'+(fd.m===m?' sl':'')+'" onclick="fd.m=\''+m+'\';render()">'+m+'</button>').join('')+'</div><textarea class="mi" rows="6" id="jit" placeholder="What\'s on your mind today…">'+e(fd.tx)+'</textarea><button class="bfu" onclick="savJ()">Save Entry</button></div>';
  var eh='';
  if(en.length===0&&!sh)eh='<div class="emp"><div class="ei">✍️</div>No entries yet.<br>Tap + Add to start writing.</div>';
  else eh=en.map(entry=>{var o=exj===entry.id;return '<div class="jc" onclick="togJ('+entry.id+')"><div class="jh"><div class="jl"><span class="jmo">'+entry.mood+'</span><div><div class="jdt">'+entry.date+'</div><div class="jtm">'+entry.time+'</div></div></div><div style="display:flex;align-items:center;gap:8px"><span class="jch'+(o?' op':'')+'">▼</span><button class="bd" onclick="event.stopPropagation();dJ('+entry.id+')">✕</button></div></div>'+(o?'<div class="jfl">'+e(entry.text)+'</div>':'<div class="jpv">'+e(entry.text)+'</div>')+'</div>';}).join('');
  return '<div><div class="sechead"><div class="sechl"><span class="secico">✍️</span><span class="sectit">Journal</span>'+(en.length?'<span class="seccnt">'+en.length+'</span>':'')+'</div><button class="badd'+(sh?' cn2':'')+'" onclick="togA(\'journal\')">'+(sh?'Cancel':'+ Add')+'</button></div>'+fh+eh+'</div>';
}
function rCS(tab){var ic={shop:'🛍️',recipes:'🍳',lists:'📋'};var dc={shop:'Your shopping list is coming soon.',recipes:'Save and browse your favourite recipes.',lists:'Keep all your lists in one place.'};return '<div class="pg"><div class="cs"><div class="csic">'+ic[tab]+'</div><h2>'+tab.charAt(0).toUpperCase()+tab.slice(1)+'</h2><p>'+dc[tab]+'</p></div></div>';}
function togA(k){af[k]=af[k]?0:1;eid=null;fd={t:'',n:'',s:'In Progress',tx:'',m:'😊'};render();if(af[k])setTimeout(()=>{var el=document.querySelector('#fit,#jit');if(el)el.focus();},50);}
function savIt(k){var t=document.getElementById('fit'),n=document.getElementById('fin');var ti=(t?t.value:fd.t).trim(),no=(n?n.value:fd.n).trim();if(!ti)return;var it=ld(MS[k].sk);it.unshift({id:Date.now(),title:ti,note:no,status:fd.s,date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})});sv(MS[k].sk,it);af[k]=0;fd={t:'',n:'',s:'In Progress',tx:'',m:'😊'};render();}
function dIt(k,id){sv(MS[k].sk,ld(MS[k].sk).filter(i=>i.id!==id));render();}
function updS(k,id,st){var it=ld(MS[k].sk),item=it.find(i=>i.id===id);if(item)item.status=st;sv(MS[k].sk,it);render();}
function savEd(k,id){var t=document.getElementById('et'+id),n=document.getElementById('en'+id);if(!t)return;var it=ld(MS[k].sk),item=it.find(i=>i.id===id);if(item){item.title=t.value.trim()||item.title;item.note=n?n.value.trim():item.note;}sv(MS[k].sk,it);eid=null;render();}
function savJ(){var el=document.getElementById('jit'),tx=(el?el.value:fd.tx).trim();if(!tx)return;var en=ld('cj');en.unshift({id:Date.now(),text:tx,mood:fd.m,date:new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})});sv('cj',en);af.journal=0;fd={t:'',n:'',s:'In Progress',tx:'',m:'😊'};render();}
function dJ(id){sv('cj',ld('cj').filter(e=>e.id!==id));render();}
function togJ(id){exj=exj===id?null:id;render();}
sh('calendar');render();
</script>
